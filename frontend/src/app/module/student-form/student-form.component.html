<mat-card class="student-card">
  <mat-card-title><h2>Add Student Info</h2></mat-card-title>

  <mat-grid-list cols="2"  rowHeight="85px" gutterSize="10px">

    <!-- Student Name -->
    <mat-grid-tile colspan="2">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Student Name</mat-label>
        <input matInput [(ngModel)]="student_name">
      </mat-form-field>
    </mat-grid-tile>

    <!-- Email -->
    <mat-grid-tile>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email">
      </mat-form-field>
    </mat-grid-tile>

    <!-- Contact -->
    <mat-grid-tile>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Contact Number</mat-label>
        <input matInput type="tel" [(ngModel)]="contact">
      </mat-form-field>
    </mat-grid-tile>

    <!-- Study Hours -->
    <mat-grid-tile>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Study Hours</mat-label>
        <input matInput type="number" [(ngModel)]="study_hours">
      </mat-form-field>
    </mat-grid-tile>

    <!-- Attendance -->
    <mat-grid-tile>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Attendance %</mat-label>
        <input matInput type="number" [(ngModel)]="attendance">
      </mat-form-field>
    </mat-grid-tile>

    <!-- Assignment Marks -->
    <mat-grid-tile colspan="2">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Assignment Marks</mat-label>
        <input matInput type="number" [(ngModel)]="assignment_marks">
      </mat-form-field>
    </mat-grid-tile>

    <!-- Button -->
    <mat-grid-tile colspan="2">
      <button
        mat-raised-button
    color="primary"
    class="px-4"
 (click)="predict()">
        Predict
      </button>
    </mat-grid-tile>

  </mat-grid-list>
</mat-card>


<br>
<div class="card p-3 mt-3">
  <h4>Send Marks History</h4>
  <input type="email" [(ngModel)]="email" placeholder="Student Email" class="form-control mb-2">
  <button class="btn btn-primary" (click)="sendMarksEmail()">Send Email</button>
</div>
